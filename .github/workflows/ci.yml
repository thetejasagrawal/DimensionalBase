name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: pip install -e ".[dev,server,security]"
      - name: Run tests with coverage
        run: pytest tests/ conformance/ -v --cov=dimensionalbase --cov-report=xml --cov-fail-under=85

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install tools
        run: pip install ruff black mypy numpy fastapi cryptography
      - name: Ruff
        run: ruff check dimensionalbase/ tests/
      - name: Black
        run: black --check dimensionalbase/ tests/
      - name: Mypy
        run: mypy dimensionalbase/ --ignore-missing-imports
